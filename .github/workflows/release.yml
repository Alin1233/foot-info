name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            os_name: linux
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            os_name: macos
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            os_name: macos
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            os_name: windows
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }} -p foot-info-tui

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../foot-info-${{ matrix.os_name }}-${{ matrix.target }}-${{ github.ref_name }}.tar.gz foot-info-tui
          cd ../../..

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/foot-info-tui.exe" -DestinationPath "foot-info-${{ matrix.os_name }}-${{ matrix.target }}-${{ github.ref_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: foot-info-${{ matrix.os_name }}-${{ matrix.target }}-${{ github.ref_name }}
          path: foot-info-${{ matrix.os_name }}-${{ matrix.target }}-${{ github.ref_name }}.${{ matrix.archive }}
          compression-level: 0

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build APK
        run: |
          cd app
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=build/symbols

      - name: Rename APK for release asset naming
        run: |
          cp app/build/app/outputs/flutter-apk/app-release.apk foot-info-android-${{ github.ref_name }}.apk

      - name: Upload renamed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: foot-info-android-${{ github.ref_name }}-asset
          path: foot-info-android-${{ github.ref_name }}.apk
          compression-level: 0

      - name: Upload Android debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: foot-info-android-symbols-${{ github.ref_name }}
          path: app/build/symbols
          if-no-files-found: error
          compression-level: 0

  release:
    name: Create GitHub Release
    needs: [build, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Foot Info ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
